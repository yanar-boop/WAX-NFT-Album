<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward Runner Collector - v7.6</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --rr-primary: #00ff41; --rr-accent: #ffd700; --rr-dark: #121212; }
        
        body { 
            background-image: url('background.png'); 
            background-attachment: fixed; 
            background-size: auto; /* Supprime le zoom */
            background-repeat: repeat; /* Répète la texture proprement */
            background-position: top left;
            background-color: var(--rr-dark); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; color: white;
        }

        /* STYLE PANNEAU (SCAN ET TITRE) */
        .rr-panel {
            background: rgba(18, 18, 18, 0.9); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--rr-primary); 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            margin-bottom: 20px;
        }

        .rr-search-box { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        
        input { 
            padding: 12px; border-radius: 25px; border: 1px solid #444; 
            background: rgba(0,0,0,0.7); color: var(--rr-primary); 
            width: 250px; outline: none; 
        }

        .rr-btn-action { 
            padding: 12px 25px; border-radius: 25px; border: none; 
            font-weight: bold; cursor: pointer; background: var(--rr-primary); 
            color: black; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .rr-btn-action:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--rr-primary); }

        /* GRILLES - RÉDUITE DE 25% POUR LES ALBUMS */
        .rr-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Taille réduite de 200px à 150px */
            gap: 15px; 
        }

        /* VIGNETTES COMMUNES */
        .rr-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; 
            padding: 12px; 
            text-align: center; 
            position: relative; 
            color: white;
            transition: 0.3s;
        }
        .rr-card:hover { border-color: var(--rr-primary); transform: translateY(-3px); }

        .rr-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 8px; } /* Image réduite aussi */

        /* SPECIFIQUE ALBUM */
        .rr-album-card { cursor: pointer; }
        .rr-badge { 
            position: absolute; top: 8px; right: 8px; 
            background: #000; color: var(--rr-primary); 
            padding: 2px 8px; border-radius: 10px; 
            font-size: 0.65rem; font-weight: bold; border: 1px solid var(--rr-primary);
        }

        /* SPECIFIQUE NFT */
        .rr-nft-card img { filter: grayscale(1) opacity(0.3); }
        .rr-nft-card.owned { border: 2px solid var(--rr-accent); background: rgba(255, 215, 0, 0.1); }
        .rr-nft-card.owned img { filter: none; opacity: 1; }

        .hidden { display: none !important; }
        #rr-back-container { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="rr-header" class="rr-panel">
    <div id="rr-status" style="font-size:0.8rem; color:var(--rr-primary); font-family: monospace;">>> SCANNING_NODES...</div>
    <div class="rr-search-box">
        <input type="text" id="rr-wallet" placeholder="Wallet (ex: rewardrun.gm)">
        <button class="rr-btn-action" onclick="rr_scan()">SCANNER</button>
    </div>
</div>

<div id="rr-library-view">
    <div id="rr-library" class="rr-grid"></div>
</div>

<div id="rr-album-view" class="hidden">
    <div id="rr-back-container">
        <button class="rr-btn-action" onclick="rr_showLibrary()">RETOUR</button>
    </div>
    <div class="rr-panel">
        <h2 id="rr-album-name" style="margin:0; color: var(--rr-accent); text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem;"></h2>
    </div>
    <div id="rr-nft-grid" class="rr-grid"></div>
</div>

<script>
    const ENDPOINTS = [
        "https://wax.greymass.com",
        "https://wax.pink.gg",
        "https://aa.neftyblocks.com",
        "https://wax.api.atomicassets.io"
    ];
    
    let currentEndpointIndex = 0;
    const RR_COLLECTION = "rewardrunner";
    let rr_schemas = []; let rr_mapping = {}; let rr_owned = []; let rr_activeSchema = ""; let rr_schemaTotals = {}; 

    async function fetchWithRetry(path) {
        for (let attempt = 0; attempt < ENDPOINTS.length * 2; attempt++) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            try {
                const endpoint = ENDPOINTS[currentEndpointIndex];
                const res = await fetch(`${endpoint}${path}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (res.ok) return await res.json();
                throw new Error("Node error");
            } catch (e) {
                clearTimeout(timeoutId);
                currentEndpointIndex = (currentEndpointIndex + 1) % ENDPOINTS.length;
            }
        }
        throw new Error("All nodes failed");
    }

    async function rr_init() {
        try {
            const data = await fetchWithRetry(`/atomicassets/v1/schemas?collection_name=${RR_COLLECTION}`);
            rr_schemas = data.data;
            const lib = document.getElementById('rr-library');
            let html = '';
            for (const s of rr_schemas) {
                const tData = await fetchWithRetry(`/atomicassets/v1/templates?collection_name=${RR_COLLECTION}&schema_name=${s.schema_name}&limit=1000`);
                rr_mapping[s.schema_name] = tData.data;
                rr_schemaTotals[s.schema_name] = tData.data.length;
                const img = tData.data[0] ? `https://ipfs.io/ipfs/${tData.data[0].immutable_data.img}` : '';
                html += `<div class="rr-card rr-album-card" onclick="rr_openAlbum('${s.schema_name}')">
                            <div class="rr-badge" id="badge-${s.schema_name}">0%</div>
                            <img src="${img}">
                            <div style="font-weight:bold; font-size:0.8rem; letter-spacing:1px;">${s.schema_name.toUpperCase()}</div>
                            <div style="font-size:0.65rem; color:var(--rr-primary); margin-top:5px;">${tData.data.length} CARTES</div>
                        </div>`;
            }
            lib.innerHTML = html;
            document.getElementById('rr-status').innerText = ">> SYSTEM_READY_";
        } catch(e) {
            document.getElementById('rr-status').innerText = ">> NODES_OFFLINE";
        }
    }

    async function rr_scan() {
        const wallet = document.getElementById('rr-wallet').value.trim();
        if(!wallet) return;
        document.getElementById('rr-status').innerText = ">> SCANNING_BLOCKCHAIN...";
        try {
            const data = await fetchWithRetry(`/atomicassets/v1/assets?collection_name=${RR_COLLECTION}&owner=${wallet}&limit=1000`);
            rr_owned = data.data.map(a => a.template.template_id);
            rr_schemas.forEach(s => {
                const total = rr_schemaTotals[s.schema_name];
                const ownedInSchema = rr_mapping[s.schema_name].filter(t => rr_owned.includes(t.template_id)).length;
                const p = total > 0 ? Math.round((ownedInSchema/total)*100) : 0;
                const badge = document.getElementById(`badge-${s.schema_name}`);
                if(badge) {
                    badge.innerText = p + '%';
                    if(p === 100) { badge.style.background = "var(--rr-primary)"; badge.style.color = "black"; }
                }
            });
            if(rr_activeSchema) rr_renderAlbum();
            document.getElementById('rr-status').innerText = ">> SCAN_COMPLETE: " + rr_owned.length + " NFTS FOUND";
            if(rr_owned.length > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00ff41', '#ffd700'] });
        } catch(e) {
            document.getElementById('rr-status').innerText = ">> SCAN_FAILED_";
        }
    }

    function rr_openAlbum(name) {
        rr_activeSchema = name;
        document.getElementById('rr-library-view').classList.add('hidden');
        document.getElementById('rr-album-view').classList.remove('hidden');
        document.getElementById('rr-album-name').innerText = name;
        rr_renderAlbum();
        window.scrollTo(0,0);
    }

    function rr_renderAlbum() {
        const templates = rr_mapping[rr_activeSchema];
        document.getElementById('rr-nft-grid').innerHTML = templates.map(t => {
            const isOwned = rr_owned.includes(t.template_id);
            return `<div class="rr-card rr-nft-card ${isOwned ? 'owned' : ''}">
                        <img src="https://ipfs.io/ipfs/${t.immutable_data.img}">
                        <div style="font-size:0.65rem; margin-top:5px; color:${isOwned ? 'var(--rr-accent)' : '#888'}">
                            ${isOwned ? 'POSSÉDÉ' : '#' + t.template_id}
                        </div>
                    </div>`;
        }).join('');
    }

    function rr_showLibrary() {
        rr_activeSchema = "";
        document.getElementById('rr-library-view').classList.remove('hidden');
        document.getElementById('rr-album-view').classList.add('hidden');
    }

    rr_init();
</script>
</body>
</html>

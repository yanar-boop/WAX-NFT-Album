<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward Runner Collector</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --rr-primary: #00ff41; --rr-accent: #ffd700; --rr-dark: #121212; }
        body {
    background-image: url('background.jpg'); /* Utilise ton image */
    background-attachment: fixed; /* L'image ne défile pas avec la page */
    background-size: cover; /* L'image couvre tout l'écran */
    background-position: center; /* Centre l'image */
    background-color: #121212; /* Couleur de secours si l'image ne charge pas */
    font-family: sans-serif;
    margin: 0;
    padding: 20px;
    color: white; /* Pour que le texte reste lisible sur fond sombre */
}
        #rr-header { background: var(--rr-dark); border-radius: 12px; padding: 25px; text-align: center; color: white; margin-bottom: 20px; }
        .rr-search-box { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        input { padding: 12px; border-radius: 25px; border: 1px solid #444; background: #1a1a1a; color: var(--rr-primary); width: 200px; }
        .rr-btn { padding: 12px 20px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; background: var(--rr-primary); }
        .rr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .rr-album-card { background: white; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        .rr-badge { position: absolute; top: 10px; right: 10px; background: #000; color: var(--rr-primary); padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; }
        .rr-album-card img { width: 100%; height: 140px; object-fit: contain; }
        .rr-nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .rr-nft-card { background: #fff; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #eee; }
        .rr-nft-card img { width: 100%; filter: grayscale(1) opacity(0.2); }
        .rr-nft-card.owned { border: 2px solid var(--rr-accent); }
        .rr-nft-card.owned img { filter: none; opacity: 1; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="rr-header">
    <div id="rr-status" style="font-size:0.7rem; color:var(--rr-primary); font-family:monospace;">>> SYSTEM_LOADING...</div>
    <div class="rr-search-box">
        <input type="text" id="rr-wallet" placeholder="Wallet (ex: rewardrun.gm)">
        <button class="rr-btn" onclick="rr_scan()">SCANNER</button>
    </div>
</div>

<button id="rr-back" class="rr-btn hidden" onclick="rr_showLibrary()" style="margin-bottom:20px; background:#444; color:white;">⬅ RETOUR</button>

<div id="rr-library" class="rr-grid"></div>

<div id="rr-album" class="hidden">
    <h3 id="rr-album-name" style="text-align: center;"></h3>
    <div id="rr-nft-grid" class="rr-nft-grid"></div>
</div>

<script>
    const RR_COLLECTION = "rewardrunner";
    let rr_schemas = []; 
    let rr_mapping = {}; 
    let rr_owned = []; 
    let rr_activeSchema = "";
    let rr_schemaTotals = {}; 

    async function rr_init() {
        try {
            const res = await fetch(`https://wax.api.atomicassets.io/atomicassets/v1/schemas?collection_name=${RR_COLLECTION}`);
            const data = await res.json();
            rr_schemas = data.data;
            
            const lib = document.getElementById('rr-library');
            let html = '';
            
            for (const s of rr_schemas) {
                // On charge jusqu'à 1000 items pour être large
                const tRes = await fetch(`https://wax.api.atomicassets.io/atomicassets/v1/templates?collection_name=${RR_COLLECTION}&schema_name=${s.schema_name}&limit=1000`);
                const tData = await tRes.json();
                
                rr_mapping[s.schema_name] = tData.data;
                rr_schemaTotals[s.schema_name] = tData.data.length;

                const img = tData.data[0] ? `https://ipfs.io/ipfs/${tData.data[0].immutable_data.img}` : '';
                html += `<div class="rr-album-card" onclick="rr_openAlbum('${s.schema_name}')">
                            <div class="rr-badge" id="badge-${s.schema_name}">0%</div>
                            <img src="${img}">
                            <div style="font-weight:bold; margin-top:10px; font-size:0.8rem;">${s.schema_name.toUpperCase()}</div>
                        </div>`;
            }
            lib.innerHTML = html;
            document.getElementById('rr-status').innerText = ">> READY";
        } catch(e) {
            document.getElementById('rr-status').innerText = ">> ERROR_LOADING_API";
        }
    }

    async function rr_scan() {
        const wallet = document.getElementById('rr-wallet').value.trim();
        if(!wallet) return;
        document.getElementById('rr-status').innerText = ">> SCANNING...";
        
        try {
            const res = await fetch(`https://wax.api.atomicassets.io/atomicassets/v1/assets?collection_name=${RR_COLLECTION}&owner=${wallet}&limit=1000`);
            const data = await res.json();
            rr_owned = data.data.map(a => a.template.template_id);
            
            rr_schemas.forEach(s => {
                const total = rr_schemaTotals[s.schema_name];
                const ownedInSchema = rr_mapping[s.schema_name].filter(t => rr_owned.includes(t.template_id)).length;
                const p = total > 0 ? Math.round((ownedInSchema/total)*100) : 0;
                
                const badge = document.getElementById(`badge-${s.schema_name}`);
                if(badge) {
                    badge.innerText = p + '%';
                    if(p === 100) badge.style.color = "#00ff41";
                }
            });
            
            if(rr_activeSchema) rr_renderAlbum();
            document.getElementById('rr-status').innerText = ">> DONE";
            if(rr_owned.length > 0) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } catch(e) {
            document.getElementById('rr-status').innerText = ">> ERROR_SCAN";
        }
    }

    function rr_openAlbum(name) {
        rr_activeSchema = name;
        document.getElementById('rr-library').classList.add('hidden');
        document.getElementById('rr-album').classList.remove('hidden');
        document.getElementById('rr-back').classList.remove('hidden');
        document.getElementById('rr-album-name').innerText = name;
        rr_renderAlbum();
    }

    function rr_renderAlbum() {
        const templates = rr_mapping[rr_activeSchema];
        document.getElementById('rr-nft-grid').innerHTML = templates.map(t => {
            const isOwned = rr_owned.includes(t.template_id);
            return `<div class="rr-nft-card ${isOwned ? 'owned' : ''}">
                        <img src="https://ipfs.io/ipfs/${t.immutable_data.img}">
                        <div style="font-size:0.6rem; color:#999;">#${t.template_id}</div>
                    </div>`;
        }).join('');
    }

    function rr_showLibrary() {
        rr_activeSchema = "";
        document.getElementById('rr-library').classList.remove('hidden');
        document.getElementById('rr-album').classList.add('hidden');
        document.getElementById('rr-back').classList.add('hidden');
    }

    rr_init();
</script>
</body>

</html>
